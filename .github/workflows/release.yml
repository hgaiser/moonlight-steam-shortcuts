name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build static binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/moonlight-steam-shortcuts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-steam-shortcuts
          path: target/x86_64-unknown-linux-musl/release/moonlight-steam-shortcuts

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: moonlight-steam-shortcuts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: moonlight-steam-shortcuts
          generate_release_notes: true
